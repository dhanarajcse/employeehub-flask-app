<!DOCTYPE html>
<html>
<head>
    <title>StaffDesk - Edit Employee</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 400px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            text-align: center;
        }

        .card h2 {
            margin-bottom: 20px;
            color: #2a5298;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: #2a5298;
            box-shadow: 0 0 8px rgba(42,82,152,0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .update-btn {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            margin-bottom: 10px;
        }

        .update-btn:hover {
            transform: scale(1.03);
        }

        .back-btn {
            background: #6c757d;
            color: white;
            text-decoration: none;
            display: block;
            text-align: center;
            padding: 14px;
            border-radius: 10px;
        }

        .back-btn:hover {
            background: #5a6268;
        }

    </style>
</head>

<body>

    <div class="card">

        <h2>Edit Employee</h2>

        <form action="/update/{{ index }}" method="POST">

            <input
                type="text"
                name="employee_name"
                value="{{ employee }}"
                required
            >

            <button type="submit" class="btn update-btn">
                Update Employee
            </button>

        </form>

        <a href="/" class="back-btn">Back to Dashboard</a>

    </div>

</body>
</html>
